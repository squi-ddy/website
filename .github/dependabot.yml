version: 2
updates:
  - package-ecosystem: "npm"
    directories:
      - "/frontend"
      - "/backend"
    schedule:
      interval: monthly
    groups:
      dependencies:
        applies-to: version-updates
        patterns:
          - "*"
      security:
        applies-to: security-updates
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: monthly

  - package-ecosystem: "gitsubmodule"
    directory: "/"
    schedule:
      interval: "daily"
